version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: postgres_db

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: urban_db

    ports:
      - "5432:5432"

  mongodb:
    image: mongo
    container_name: mongo_db

    ports:
      - "27017:27017"